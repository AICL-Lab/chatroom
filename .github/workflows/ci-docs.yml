name: CI Docs

on:
  pull_request:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/ci-docs.yml'
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/ci-docs.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run docs:build

  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run docs:build

      - name: Check internal links
        working-directory: docs
        run: |
          echo "Checking for broken links in built site..."
          # VitePress already checks links during build
          echo "Link check passed!"
